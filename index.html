<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05060f">
<title>NEON RUSH — Cyber Arena Shooter</title>
<meta name="description" content="ネオン輝くサイバーアリーナで戦うスマホ向けアクションシューター">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2305060f'/%3E%3Cpath d='M16 5 L25 24 L16 19 L7 24 Z' fill='%2329f0ff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-wrap">
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div class="hud-top">
        <div class="hud-left">
          <div class="hp-label">SHIELD</div>
          <div class="hp-bar"><div id="hp-fill"></div></div>
        </div>
        <div class="hud-center">
          <div id="wave-label">WAVE 1</div>
        </div>
        <div class="hud-right">
          <div id="score">0</div>
          <div class="score-label">SCORE</div>
        </div>
      </div>
      <div id="combo" class="combo hidden"></div>
    </div>

    <!-- Title Screen -->
    <div id="title-screen" class="overlay">
      <div class="title-bg-grid"></div>
      <h1 class="game-title"><span class="t-neon">NEON</span><span class="t-rush">RUSH</span></h1>
      <p class="subtitle">CYBER ARENA SHOOTER</p>
      <button id="btn-start" class="neon-btn">TAP TO START</button>
      <div class="howto">
        <div><span class="key">左タッチ</span> 移動</div>
        <div><span class="key">自動照準</span> 射撃</div>
        <div><span class="key">右タップ</span> ダッシュ</div>
      </div>
      <div id="hiscore-title" class="hiscore"></div>
    </div>

    <!-- Game Over -->
    <div id="gameover-screen" class="overlay hidden">
      <h2 class="go-title">GAME OVER</h2>
      <div class="go-stats">
        <div class="go-row"><span>SCORE</span><b id="go-score">0</b></div>
        <div class="go-row"><span>WAVE</span><b id="go-wave">1</b></div>
        <div class="go-row"><span>BEST</span><b id="go-best">0</b></div>
      </div>
      <div id="new-record" class="new-record hidden">NEW RECORD!</div>
      <button id="btn-retry" class="neon-btn">RETRY</button>
    </div>
  </div>

  <script src="js/audio.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
